seed: 42

# Models are instantiated using skrl's model instantiator utility
models:
  separate: True
  policy:  # stochastic actor
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.5
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: elu
    output: ACTIONS
  critic_1:  # Q(s, a)
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [128, 128]
        activations: elu
    output: ONE
  critic_2:  # Q(s, a)
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [128, 128]
        activations: elu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [128, 128]
        activations: elu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [128, 128]
        activations: elu
    output: ONE

# Replay buffer
memory:
  class: RandomMemory
  memory_size: 32768

# SAC agent configuration
agent:
  class: SAC
  rollouts: 1
  gradient_steps: 1
  batch_size: 512
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 3.0e-4
  critic_learning_rate: 3.0e-4
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  random_timesteps: 2048
  learning_starts: 2048
  grad_norm_clip: 1.0
  learn_entropy: True
  entropy_learning_rate: 3.0e-4
  initial_entropy_value: 0.2
  target_entropy: null
  rewards_shaper_scale: 1.0
  mixed_precision: False
  experiment:
    directory: "quadcopter_forest_pose_direct_migrated_sac"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

trainer:
  class: SequentialTrainer
  timesteps: 4000000
  environment_info: log
