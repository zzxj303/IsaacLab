seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: False
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -1.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256, 128]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256, 128]
        activations: elu
    output: ONE


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1


# PPO agent configuration
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO
  rollouts: 32
  learning_epochs: 5
  mini_batches: 8
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 5.0e-05
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.016
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs:
    size: 24
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs:
    size: 1
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5
  ratio_clip: 0.15
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.002
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1
  time_limit_bootstrap: False
  experiment:
    directory: "quadcopter_winding_corridor_direct"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: 2000


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 500000
  environment_info: log
  disable_progressbar: false


# Early stopping configuration
early_stopping:
  enabled: true
  metric: "Reward/mean_reward"
  patience: 50
  min_delta: 0.01
  window_size: 10
  verbose: true
